openapi: 3.0.0

info:
  title: User API
  version: 1.0.0
  description: API endpoints for managing users

tags:
  - name: User
    description: User management

paths:
  /api/user:
    post:
      tags:
        - User
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
        '400':
          description: Validation error
        '500':
          description: Failed to create user

    get:
      tags:
        - User
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          description: Failed to fetch users

  /api/user/{id}:
    get:
      tags:
        - User
      summary: Get a user by ID
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: User ID
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
        '500':
          description: Failed to fetch user

    put:
      tags:
        - User
      summary: Update a user
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Validation error
        '404':
          description: Not found
        '500':
          description: Failed to update user

    delete:
      tags:
        - User
      summary: Delete a user
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: User ID
      responses:
        '200':
          description: Deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Not found
        '500':
          description: Failed to delete user

  /api/user/username/{username}:
    get:
      tags:
        - User
      summary: Get a user by ID
      parameters:
        - in: path
          name: username
          schema:
            type: string
          required: true
          description: User username
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
        '500':
          description: Failed to fetch user


components:
  schemas:
    UserInput:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        hashedPassword:
          type: string
          minLength: 8
      required:
        - username
        - hashedPassword

    User:
      allOf:
        - $ref: '#/components/schemas/UserInput'
        - type: object
          properties:
            _id:
              type: string
