openapi: 3.0.0

info:
  title: User API
  version: 1.0.0
  description: API endpoints for managing users

tags:
  - name: User
    description: User management

paths:
  /api/users:
    post:
      tags:
        - User
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  _id:
                    type: string
        '400':
          description: Validation error
        '500':
          description: Failed to create user

    get:
      tags:
        - User
      summary: Get all users
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '500':
          description: Failed to fetch users

  /api/users/{id}:
    get:
      tags:
        - User
      summary: Get a user by ID
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: User ID
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Not found
        '500':
          description: Failed to fetch user

    put:
      tags:
        - User
      summary: Update a user
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: User ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserInput'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Validation error
        '404':
          description: Not found
        '500':
          description: Failed to update user

    delete:
      tags:
        - User
      summary: Delete a user
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: User ID
      responses:
        '200':
          description: Deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Not found
        '500':
          description: Failed to delete user

  /api/users/auth:
    post:
      tags:
        - User
      summary: Authenticate a user
      description: Validate username and hashedPassword. Returns userId if authentication is successful.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: "john_doe"
                hashedPassword:
                  type: string
                  example: "hashedpassword123"
              required:
                - username
                - hashedPassword
      responses:
        '200':
          description: Authentication result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  userId:
                    type: string
                    nullable: true
        '400':
          description: Missing username or password
        '500':
          description: Internal server error

components:
  schemas:
    UserInput:
      type: object
      properties:
        username:
          type: string
          minLength: 3
        hashedPassword:
          type: string
          minLength: 8
      required:
        - username
        - hashedPassword

    User:
      allOf:
        - $ref: '#/components/schemas/UserInput'
        - type: object
          properties:
            _id:
              type: string
