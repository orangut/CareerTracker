openapi: 3.0.0
info:
  title: Stage Management API
  version: 1.0.0
  description: API for managing application stages associated with a Job Application.

servers:
  # NOTE: Adjust the base path based on how your router is mounted
  - url: /api/stage
    description: Base URL for Stage endpoints

paths:
  /api/stage:
    # ----------------------------------------------------
    # POST /api/stage - Create Stage
    # ----------------------------------------------------
    post:
      tags:
        - Stages
      summary: Create a new stage for a job application.
      description: Validates user input, inserts a new stage, and updates the parent job application's lastStageId.
      security:
        # Assuming validation middleware requires user authentication/context
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StageCreate'
      responses:
        '201':
          description: Stage successfully created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stage'
        '400':
          description: Invalid input or validation error (e.g., missing required fields, invalid date format).
        '500':
          description: Server error.

  /api/stage/{stageId}:
    parameters:
      - in: path
        name: stageId
        schema:
          type: string
          format: objectId
        required: true
        description: The ID of the Stage to retrieve, update, or delete.

    # ----------------------------------------------------
    # GET /api/stage/{stageId} - Get Stage by ID
    # ----------------------------------------------------
    get:
      tags:
        - Stages
      summary: Retrieve a single stage by its ID.
      description: Fetches a stage if it belongs to the authenticated user's job application.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stage found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stage'
        '404':
          description: Stage not found or does not belong to the Job Application/User.
        '500':
          description: Server error.

    # ----------------------------------------------------
    # PUT /api/stage/{stageId} - Update Stage
    # ----------------------------------------------------
    put:
      tags:
        - Stages
      summary: Update an existing stage.
      description: Updates the stage details and modifies the parent job application's updatedAt timestamp.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StageUpdate'
      responses:
        '200':
          description: Stage successfully updated. Returns the updated stage object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stage'
        '400':
          description: Invalid input or validation error.
        '404':
          description: Stage not found.
        '500':
          description: Server error.

  /api/stage/{id}:
    parameters:
      - in: path
        name: id
        schema:
          type: string
          format: objectId
        required: true
        description: The ID of the Stage to delete.

    # ----------------------------------------------------
    # DELETE /api/stage/{id} - Delete Stage
    # ----------------------------------------------------
    delete:
      tags:
        - Stages
      summary: Delete a stage.
      description: Deletes the stage, recalculates the parent job application's lastStageId, and updates the timestamp.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Stage successfully deleted.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Deleted successfully
                  lastStageId:
                    type: string
                    nullable: true
                    format: objectId
                    description: The ID of the new last stage, or null if no stages remain.
        '400':
          description: Invalid stage ID format.
        '404':
          description: Stage not found.
        '500':
          description: Server error.


components:
  schemas:
    StageType:
      type: string
      enum: [applied, phone_screen, technical_interview, final_interview, offer, rejected, withdrawn]
      description: The current type or status of the application stage.

    Stage:
      type: object
      properties:
        _id:
          type: string
          format: objectId
          description: MongoDB ObjectId for the stage.
        jobApplicationId:
          type: string
          format: objectId
          description: Reference to the parent JobApplication.
        type:
          $ref: '#/components/schemas/StageType'
        startedAt:
          type: string
          format: date-time
          description: Date the stage started.
        completedAt:
          type: string
          format: date-time
          nullable: true
          description: Date the stage was completed.
        notes:
          type: array
          items:
            type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - jobApplicationId
        - type
        - startedAt
        - createdAt
        - updatedAt

    StageCreate:
      type: object
      description: Schema for creating a new Stage (user input fields only).
      properties:
        type:
          $ref: '#/components/schemas/StageType'
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        notes:
          type: array
          items:
            type: string
          nullable: true
      required:
        - type
        - startedAt

    StageUpdate:
      type: object
      description: Schema for updating an existing Stage (all fields are optional).
      allOf:
        - $ref: '#/components/schemas/StageCreate'
      properties: {} # All fields inherited from StageCreate are made optional by the PUT endpoint logic.