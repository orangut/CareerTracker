tags:
  - name: Job Applications
    description: API for managing job application records

paths:
  /api/jobapplications:
    get:
      summary: Get all job applications for the authenticated user
      description: Retrieves a list of all job application records that belong to the user authenticated via the HttpOnly cookie.
      tags:
        - Job Applications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of job applications.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobApplication'
        '401':
          description: Unauthorized - The provided token is missing or invalid.
        '500':
          description: Internal server error.

    post:
      summary: Create a new job application
      description: Creates a new job application record linked to the authenticated user.
      tags:
        - Job Applications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                company:
                  type: string
                  example: "Google"
                position:
                  type: string
                  example: "Software Engineer"
                location:
                  type: string
                  example: "Mountain View, CA"
                applicationDate:
                  type: string
                  format: date
                  example: "2025-09-17"
                interestLevel:
                  type: number
                  example: 5
                currentStage:
                  type: string
                  enum:
                    - "applied"
                    - "phone_screen"
                    - "technical_interview"
                    - "final_interview"
                    - "offer"
                    - "rejected"
                    - "withdrawn"
                  example: "applied"
                salaryMin:
                  type: number
                  example: 120000
                salaryMax:
                  type: number
                  example: 150000
                remoteOption:
                  type: string
                  enum:
                    - "remote"
                    - "hybrid"
                    - "onsite"
                  example: "remote"
                jobUrl:
                  type: string
                  format: url
                  example: "https://careers.google.com/jobs/..."
                isEdit:
                  type: boolean
                  example: false
                notes:
                  type: array
                  items:
                    type: string
                  example: ["Initial conversation with recruiter."]
                stages:
                  type: array
                  items:
                    type: string
                  example: ["Applied online", "Recruiter call scheduled"]
      responses:
        '201':
          description: Job application created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobApplication'
        '400':
          description: Invalid input data.
        '401':
          description: Unauthorized - The provided token is missing or invalid.

components:
  schemas:
    JobApplication:
      type: object
      properties:
        id:
          type: number
          description: The unique identifier for the job application.
          example: 101
        userId:
          type: number
          description: The ID of the user who owns this application.
          example: 25
        company:
          type: string
          example: "Google"
        position:
          type: string
          example: "Software Engineer"
        location:
          type: string
          example: "Mountain View, CA"
        applicationDate:
          type: string
          format: date
          example: "2025-09-17T12:00:00Z"
        interestLevel:
          type: number
          example: 5
        currentStage:
          type: string
          enum:
            - "applied"
            - "phone_screen"
            - "technical_interview"
            - "final_interview"
            - "offer"
            - "rejected"
            - "withdrawn"
          example: "applied"
        salaryMin:
          type: number
          example: 120000
        salaryMax:
          type: number
          example: 150000
        remoteOption:
          type: string
          enum:
            - "remote"
            - "hybrid"
            - "onsite"
          example: "remote"
        jobUrl:
          type: string
          format: url
          example: "https://careers.google.com/jobs/..."
        isEdit:
          type: boolean
          example: false
        notes:
          type: array
          items:
            type: string
          example: ["Initial conversation with recruiter."]
        stages:
          type: array
          items:
            type: string
          example: ["Applied online", "Recruiter call scheduled"]